version: "3.9"

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: "minio@admin"
      MINIO_ROOT_PASSWORD: "minio@admin"
    volumes:
      - ./data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"


  minio-create-buckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minio@admin minio@admin) do echo 'Aguardando MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/commons || true;
      /usr/bin/mc anonymous set download myminio/commons || true;
      exit 0;
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
